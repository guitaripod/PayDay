name: PayDay
options:
  bundleIdPrefix: com.guitaripod
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_REGION_BASED_ISOLATION: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${PAYDAY_TEAM_ID}
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  PayDayKit:
    path: .
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  AICredits:
    url: git@github.com:guitaripod/AICredits.git
    from: "1.3.0"

targets:
  PayDay:
    type: application
    platform: iOS
    sources:
      - path: PayDay
        excludes:
          - "Secrets.example.swift"
      - path: PayDay/Secrets.swift
        optional: true
    dependencies:
      - package: PayDayKit
        product: PayDayKit
      - package: GRDB
      - package: AICredits
        product: AICreditsCore
      - package: AICredits
        product: AICreditsRevenueCat
      - package: AICredits
        product: AICreditsUI
    info:
      path: PayDay/Info.plist
      properties:
        CFBundleDisplayName: Pay Day
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UIRequiredDeviceCapabilities:
          - arm64
        UIViewControllerBasedStatusBarAppearance: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: Pay Day uses the camera so you can photograph a receipt or quote and turn it into invoice line items.
        NSPhotoLibraryUsageDescription: Pay Day lets you pick a logo for your invoices and import a photo of a receipt to draft line items.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: PayDay/PayDay.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PAYDAY_BUNDLE_ID}
        PRODUCT_NAME: PayDay
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "PayDay App Store 2026"

  PayDayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PayDayTests
    dependencies:
      - target: PayDay
      - package: PayDayKit
        product: PayDayKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ${PAYDAY_BUNDLE_ID}.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PayDay.app/PayDay
        BUNDLE_LOADER: $(TEST_HOST)
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  PayDay:
    build:
      targets:
        PayDay: all
        PayDayTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PayDayTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
